<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Cigarrillos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest-v2.json">
</head>
<body>

    <h1>Registro de Cigarrillos</h1>
<div id="pantalla-principal">
    <label for="contexto">Contexto:</label>
    <select id="contexto">
        <option value="">-- Selecciona --</option>
        <option value="Ordenador">Ordenador</option>
        <option value="Descanso">Descanso</option>
        <option value="Pelicula">Película</option>
        <option value="Social">Social</option>
        <option value="Post-ingesta">Post-ingesta</option>
        <option value="Otro">Otro</option>
    </select>

    <div id="contenedor-boton">
        <button id="boton-rojo"></button>
    </div>


    <p id="mensaje" class="oculto"></p>

    <div id="info-dia">
        <p id="contador"></p>
        <p id="ultimo"></p>
    </div>

    <button id="descargar">Descargar CSV</button>
    <button id="importarBtn">Importar CSV</button>
    <input type="file" id="archivoCSV" accept=".csv" style="display:none">

    <button id="mostrargrafico">Mostrar Grafico</button>
    


    <div id="version" style="font-size:12px; color:#888; margin-top:20px;"></div>
    </div>


<div id="pantalla-grafico" style="display:none; padding:20px;">
    <button id="volver-principal" style="margin-bottom:15px;">Volver</button>

    <div style="margin-bottom:10px;">
        <label>Periodo:</label>
        <select id="selector-periodo">
            <option value="dia">Últimos 6 días</option>
            <option value="semana">Últimas 6 semanas</option>
            <option value="mes">Últimos 6 meses</option>
        </select>

        <label style="margin-left:20px;">Contexto:</label>
        <select id="selector-contexto">
            <option value="todos">Todos</option>
            <option value="Ordenador">Ordenador</option>
            <option value="Descanso">Descanso</option>
            <option value="Pelicula">Película</option>
            <option value="Social">Social</option>
            <option value="Post-ingesta">Post-ingesta</option>
            <option value="Otro">Otro</option>
        </select>
    </div>
<div id="leyenda-contextos">
    <span style="color:#4A90E2;">■</span> Ordenador
    <span style="color:#7ED321;">■</span> Descanso
    <span style="color:#F5A623;">■</span> Película
    <span style="color:#BD10E0;">■</span> Social
    <span style="color:#D0021B;">■</span> Post-ingesta
    <span style="color:#9B9B9B;">■</span> Otro
</div>

    <div id="contenedor-grafico" style="overflow-x:auto; width:100%;">
        <canvas id="canvas-grafico" height="300"></canvas>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

    <script src="app.js"></script>
</body>
</html>
